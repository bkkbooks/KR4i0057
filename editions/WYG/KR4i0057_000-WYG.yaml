body:
  text: 金石要例詩文評類提要臣等謹案金石要例一巻國朝黄宗羲撰宗羲有明儒學案已别著録是書櫽括古人金石之例凡三十六則後附論文管見九則自序謂潘蒼崖有金石例大段以昌黎為例顧未嘗著為例之義與壊例之始亦有不必例而例之者如上代兄弟宗族姻黨有書有不書不過以著名不著名初無定例故摘其要領稍為辨正所以補蒼崖之缺云云蒼崖者元潘昂霄之號此書盖補其金石例之所遺者也所収如比干銅槃銘出王球嘯堂集古録乃宋人偽作夏侯嬰石槨銘出呉均西京雜記亦齊梁人影撰引為證佐未免失考又據孫何碑觧論碑非文章之名不知劉勰文心雕龍已列此目如樂府本官署之名而相沿既久無不稱歌詞為樂府者宗羲必䋲以古義亦未免太拘然宗羲於文律本嫻其所考證實較昂霄原書為精宻講金石之文者固不能不取裁于斯焉乾隆四十二年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:cccbf476a3c27cd27b2a0c26f218944e178d88802ba4362d017e699b35fcd41a
