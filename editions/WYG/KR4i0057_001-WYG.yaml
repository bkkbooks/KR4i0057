body:
  text: 金石要例餘姚黄宗羲撰碑版之體至宋末元初而瓌逮至今日作者既張王李趙之流子孫得之以答賻奠與紙錢寓馬相為出入使人知其子姓婚姻而已其壊又甚于元時似世系而非世系似履歴而非履歴市聲俗軌相沿不覺其非元潘蒼崖有金石例大叚以昌黎為例顧未嘗著為例之義與壊例之始亦有不必例而例之者如上代兄弟宗族姻黨有書有不書不過以著名不著名初無定例乃一一以例言之余故摘其要領稍為辯正所以補蒼崖之缺也書合𦵏例婦人從夫故誌合𦵏者其題只書某官某公墓誌銘或墓表未有書暨配某氏也張説為蕭灌神道碑云南城侯之夫人同刻碑銘其題贈吏部尚書蕭公神道碑其妻韋氏書事實於内題則不列楊烱為王義童神道碑其子師本陪𦵏亦不别為標題自唐至元皆無夫婦同列者此當起于近世王慎中集中如處士陳東莊公暨配黎氏墓表葢不一而足也婦女誌例婦女之志以夫爵冠之如某官夫人某氏或某官某人妻某氏庾信陳子昂張説獨孤及皆然若子著名則以子爵冠之如柳子厚為王叔文母誌書户部侍郎王公先太夫人河間劉氏婦人後夫而死者其𦵏書祔𦵏權徳輿集中宏農楊氏河東縣君柳氏博陵縣君崔氏皆如此例書名例碑志之作當直書其名字而東漢諸銘載其先代多只書官唐宋名人文集所志往往只稱君諱某字某使其後至於無考為可惜稱呼例名位著者稱公名位雖著同輩以下稱君耆舊則稱府君昌黎集中有董府君獨孤府君張府君衛府君盧府君韓府君有文名者稱先生如昌黎之稱施先生貞曜先生皇甫湜之稱昌黎韓先生友人則稱字如昌黎之于李元賔樊紹述張孝權元姚牧菴稱趙提刑夫人為楊君則變例也墓誌無銘例墓誌而無銘者葢叙事即銘也昌黎張圓之誌云叙次其族世名字事始終而銘曰云云葢所謂誌銘者通一篇而言之非以叙事属志韻語属銘猶如作賦者末有重曰亂曰總之是賦不可謂重是重亂是亂也故無銘者猶賦之無重無亂者也正考甫之鼎銘云一命而僂再命而傴三命而俯循墻而走亦莫敢余侮饘于是粥于是以餬余口比干銅盤曰右林左泉後岡前道萬世之寜兹焉是保漢滕公石銘曰佳城鬰鬰三千年見白日吁嗟滕公居此室此有韻之銘也季札之䘮孔子銘其墓曰嗚呼有吳延陵季子之墓衛孔悝鼎銘曰六月丁亥公假于太廟公曰叔舅乃祖莊叔左右成公成公乃命莊叔随難于漢陽即宫于宗周奔走無射啓右獻公獻公乃命成叔纂乃祖服乃考文叔興舊耆欲作率慶士躬恤衛國其勤公家夙夜不懈民咸曰休哉公曰叔舅予女銘若纂乃考服悝拜稽首曰對揚以辭之勤大命施于烝彛鼎此無韻之銘也古來原有此兩様墓表神道碑俱有銘有不銘單銘例叙事即在韻語中昌黎房使君鄭夫人殯表大理評事胡君墓銘盧渾墓誌銘墓表例墓表表其人之大畧可以傳世者不必細詳行事如唐文通先生宋明道之表是也歐文胡瑗石曼卿墓表皆不書子姓今制三品以上神道碑四品以下墓表銘藏于幽室人不可見碑表施于墓上以之示人雖碑表之名不同其實一也故墓表之書子姓墓表之有銘不可謂非也自有墓表更無墓碣則墓表之製方趺圓首可知矣故與碑分品級柳州稱神道表神道與墓無品級之可分也神道碑例柳州𦵏令曰凡五品以上為碑龜趺螭首降五品為碣方趺圓首此碑碣之分是凡言碑者即神道碑也後世則碣亦謂之碑矣豈以神道二字重于墓乎地理家以東南為神道蘇瓌碑建于塋北一十五里亦曰神道碑宋孫何碑解云班固有泗亭長碑文蔡邕有郭有道陳太㐀碑文其文皆有序冠篇末則亂之以銘未嘗以碑為文章之名也迨李翺為高愍女碑羅隠為三叔碑梅先生碑則所謂序與銘皆混而不分集列其目亦不復曰文戾孰甚焉今當如班蔡之作存序與銘通謂之文可也楊烱為成知禮神道碑其碑銘之後有系曰若楚詞别自一體婦人妃主亦稱神道碑如張説和麗妃息國長公主李華東光縣主楊綰郭汾陽夫人是也行狀例行狀為議謚而作與求志而作者其體稍異為謚者須將謚法配之可不書婚娶子姓昌黎狀董晉亦書子姓柳州狀叚太尉狀柳渾是也為求文者昌黎之狀馬韓柳州之狀陳京白香山之狀祖父是也婦女行狀例王魯齋曰衛公叔文子卒其子請謚于君曰日月有時將葬矣請所以易其名者請謚之詞意者今世行狀之始也自唐以來有官不應謚亦為行狀者將求名世之士為之誌銘而行狀之本意始反矣觀昌黎廬陵東坡三集銘人之墓最多而行狀共不過五篇而婦人不為也又知婦人之不為行狀之意亦明矣按江淹為宋建太妃周氏行狀任昉裴野皆有婦人行狀非婦人不為行狀也行述例歐陽𤣥銘曽秀才云行述似翁所作孛术魯翀作姚天樞神道碑云其子侃以公行實徴録歐陽發作事迹此皆與行狀名異而實同也今既有行實又有行狀無乃重出乎誄例誄亦納于壙中故柳州虞寉鳴誄云追列遺懿求諸后土誌銘亦可謂之誄元鄭師山為洪頤墓誌銘云其門人俞溥狀其言行俾為之誄以識其葬子孫為祖父行狀例今人為其父行狀稱父之父為王父王父之父稱為曽王父曽王父之父稱為高王父非也稱謂當以父為主故穆員狀父云高祖宏逺曽祖固禮祖思恭考元休未嘗以員之自稱易之孫逖父銘陳子昻父志皆如之碑誌煩簡例誌銘藏于壙中宜簡神道碑立于墓上宜詳然范仲淹為种世衡志數千餘言韓維志程明道亦數千言東坡范蜀公志五千餘言唯昌黎煩簡得當先廟碑例先廟碑見於昌黎集中者皆叙立廟之由本其得姓之始祖功宗徳而已至元則侈大其子孫於祖宗反畧焉先塋先徳昭先等碑名雖不同其義一也宋景濓為單氏先塋碑銘云公之勲業不附先徳之後何以白前人積累之深雖昩於造文之體不暇䘏也當知碑先徳而後子孫者非文之正體矣書祖父例蔡邕祖擕碑云擕字叔業曽祖父勲擕生稜稜生邕邕至勲連身六世故後漢邕傳稱勲為六世祖而唐穆員為其父誌高祖上一世則稱五代祖陳子昻志父墓五世祖太樂生高祖方慶方慶生曽祖湯湯生祖通通生皇考辯柳州父神道表六代祖慶五代祖旦高祖楷蘇子羙父誌亦然此當從後范育吕和叔墓表稱曽祖為皇考祖為王考庾承宣為田布碑稱曽祖為王大父柳州柳府君墳前石表辭稱高祖王父曽祖王父祖王父不書子婦例女子重所歸故壻多書子婦例不書楊烱為曹通神道碑載子婦一人以其陪窆于塋内也裴抗為田承嗣神道碑載子婦二人以其為公主也而宋之黄裳誌夫人黄氏男三長曰淳娶孫氏次曰昱娶楊氏少曰延娶張氏楊慈湖誌舒元質云生子五人曰鈃叔晦壻曰鉦娶袁氏曰銑簡女女焉曰鍇娶趙氏曰鐻叔和之壻也方大琮誌其父云大輿娶温陵趙奉直不劬之女大琫娶福唐林簡肅栗之孫女大鏞娶薛左史元昇之孫女誌林景詵云男榮公聘王氏誌徐母趙氏云子庭蘭娶俞料院某之孫女此外諸家文集亦不多見至元而古法蕩然閻復廣平王碑元明善淇陽王碑無不書子婦矣子女不分書所出例子女皆統于父雖異母而不分書所出在唐如權徳輿誌李巽三夫人四子不言某属某氏楊綰作郭汾陽夫人神道碑六子八女俱書夫人下在宋歐公誌蘇子美先娶鄭氏後娶杜氏三子誌梅舜俞初娶謝氏再娶刁氏子男五人女二人温公誌吕獻可始娶張氏後娶時氏四子六女荆公志葛源元配孫氏繼配盧氏三子一女誌蘇安世娶葉氏又娶某氏子四人女子五人誌李宗辯男十五人女十九人俱書夫人季氏下是皆以父為主不必分属之母此定例也然婦無别志即附見夫志之内者前後夫人不妨分属子女如昌黎碑楊燕竒夫人李氏有男四人女二人後夫人雍氏有男一人女二人志昭武李公三娶元配韋氏生子紘女貢次配崔氏生綽紹綰今夫人無子白樂天之志元㣲之穆員之志鄭叔則皆用此例迨元姚牧菴碑姚樞書子女某出某出虞伯生志牟應龍亦書某出張起岩狀張宏夫人趙氏姜氏二子元節趙出元里姜出此非古法之所有也婦人誌書子女例婦人之志非其所生者不書臨川誌曽易占子男六人曅鞏牟宰布肇女九人其志夫人吳氏子男三鞏牟宰女一妾不書例婢妾所生之子書其子不書其母如昌黎志李郱云夫人博陵崔氏七男三女邠為澄城主簿其嫡激鄜城令放芮城尉漢監察御史滻洸潘皆進士是崔氏所生只激一人其六人皆不書其母誌李惟簡云夫人崔氏有四子長曰元孫次曰元質元立元本元立元本皆崔氏出其二子皆不書其母誌鄭君云初娶韋肇女生二女一男後娶李則女生一女二男其餘男二人女四人其餘者葢婢妾所生故不書其母李定母仇氏王文公為李閒誌書定于正室浩氏之下不書仇氏古例皆然至元而壊之劉敏中忠獻碑書妾李謙為張文謙神道碑書側室姚牧菴阿力海涯碑書如夫人潘澤碑子希永他室李出蘇天爵高文貞碑銘子男三人履恒麻夫人出益側室王氏出耶律有尚碑子男五人長楷次樸次權皆伯徳夫人出也次栝次檢庶也宋景濓方愚菴墓版文稱妾為少房不書子姓及妻例周隋碑志多不書子姓幷不書配其時夫婦各自為志故不書至于合𦵏者夫人必書如庾子山之叚永司馬裔柳霞侯莫陳道生宇文顯和諸碑是也後來歐陽為石守道志不書妻某氏子某名尹師魯亦不書子名有書子不書妻周隋閒多有之至唐如孫逖誌李暠獨孤及志姚子彦皆然單書嗣子例周隋之碑單書嗣子未嘗人人而書也觀庾子山諸碑司馬裔但書世子侃長孫儉但書墩等兄弟紇干宏但書世子恭等崔詵但書世子洪度辛威但書世子永達叚永但書世子岌唐權文公為伊慎神道碑但書冡嗣餘書息男十六人書孫曽例昌黎碑誌只書子女更無書孫者孫逖為杜義寛碑書孫以表其墓權文公為王端碑書孫以其葬王父白樂天碑崔孚書孫以其求文張曲江為吕處真書其孫女為李仁瞻書其孫李廻秀為裴希惇書其孫皆以立碑故其他皆不書也至宋則皆書孫矣不特孫也且及于曽孫矣廬陵蘇明允誌書孫曽子固誌錢純老書孫東坡狀温公書孫子固誌沈率府子三人某某孫八人某某曽孫三人某某東坡范蜀公誌書曽孫女虞伯生碑張宏範書孫六人某官某曽孫十一人某官某書孫壻例葉水心臧氏誌書孫壻虞伯生狀董文用孫女十人長適某次適某某馬石田銘劉百户孫女四人一適某一適某唐時孫壻不敢入碑志或列之碑隂與先友一例權文公之碑王光謙是也書外甥例王文公仁夀縣太君徐氏誌書外孫四十七人孫不宜分属例今世書孫又各於孫下系以某子所出爾雅曰男子謂姊妺之子為出公羊傳曰葢舅出以鄫世子巫與魯襄公俱是莒外孫同所自出故凡言出者因母姓而云也今以出属之于父不通甚矣且父在則孫俱属之父子不私為一己之有也不書壻祖父例女之所適但書壻之姓氏不當及壻之祖父也元明善誌袁夫人史氏書女長適宋相史莊肅公嵩之之孫似伯次適工部尚書余天任之孫昌期次適宋資政殿大學士史岩之之孫益伯以顯宦著名故變例書之蘇天爵志袁文清女四人其二人書適故觀文殿大學士趙某孫田錫適故相史忠定王𤣥孫公佾其二人書適同知袁州路總管府事趙孟貫適處州儒學録余應榘二書祖父二不書者以著名不著名也然已為濫惡今世不論馬醫夏畦一㮣書某某之子若孫某不知何謂也書生卒年月日例凡書生卒止書某年某月某日不書某時書國號例凡書出仕於前代稱其國號當代稱皇柳州柳渾陳京狀是也書妻變例張景妻唐氏再適宋祁載之書女變例韓文公三女其長女初適李漢改適樊宗懿誌書壻左拾遺李漢聓集賢校理樊宗懿次女許嫁陳氏三女未笄聓即壻之别名此皇甫持正變例也塔銘例柳州云凡𦵏大浮圖無竁穴其於用碑不宜然柳州之為浮圖碑多矣今釋氏之𦵏不曰碑銘而曰塔銘者猶存不宜用碑之義也書僧臘例今之為塔銘者于其終也書僧臘若干世夀若干因話録云釋氏結夏随其身之輕重以蠟為其人解夏之後以本身驗于蠟人輕則為妄想耗其氣血矣今作伏臘之臘失其義矣柳州書為僧凡若干年其夀若干或凡年若干為僧若干期僧稱公例凡僧稱某公皆以其名宋景濓塔銘可案也今乃以其字稱公此村野驅烏所為奈何文章家因之寺碑例宋景文筆記云碑者施于墓則下棺施于廟則繫牲古人因刻文其上今佛氏掲大石鏤文士大夫皆題曰碑銘何耶案儀禮碑在堂下三分庭之一當碑揖宗廟路寢庠序皆有碑所以識日景是不特繫牲而用也碑于釋氏無礙名義如王簡栖頭陀寺碑文其來已久矣銘法例祭統銘之義稱美而不稱惡此孝子孝孫之心也故昌黎云應銘法若不應銘法則不銘之矣以此寓褒貶于其間然昌黎之于子厚言少年勇於為人不自貴重誌李干單書服秘藥一事以為世戒誌李虚中亦書其以水銀為黄金服之冀不死誌王適書其謾侯高事誌李道古言其薦妄人柳泌皆不掩所短非截然諛墓者也論文管見附昌黎陳言之務去所謂陳言者每一題必有庸人思路共集之處纒繞筆端剝去一層方有至理可言猶如玉在璞中鑿開頑璞方始見玉不可認璞為玉也不知者求之字句之間則必如曹成王碑乃謂之去陳言豈文從字順者為昌黎之所不能去乎言之不文不能行逺今人所習大概世俗之調無異吏胥之案牘旗亭之日歴即有議論叙事敝車羸馬終非鹵簿中物學文者須熟讀三史八家將平日一副家儅盡行籍没重新積聚竹頭朩屑常談委事無不有來歴而後方可下筆顧傖父以世俗常見者為清真反視此為脂粉亦可笑也作文雖不貴模倣然要使古今體式無不備于胸中始不為大題目所壓倒有如女紅之花様成都之錦自與三村之越異其機軸今人見歐曽一二轉折自詫能文余嘗見小兒摶泥為􅀈擊之石上鏗然有聲泥多者聲宏若以一丸為之總使能響其聲㡬何此古人所以讀萬巻也叙事須有風韻不可擔板今人見此遂以為小説家伎倆不觀晉書南北史列傳每寫一二無闗係之事使其人之精神生動此頰上三毫也史遷伯夷孟子屈賈等傳俱以風韻勝其填尚書國䇿者稍覺擔板矣文必本之六經始有根本唯劉向曽鞏多引經語至於韓歐融聖人之意而出之不必用經自然經術之文也近見巨子動將經文填塞以希經術去之逺矣文以理為主然而情不至則亦理之郛廓耳廬陵之誌交友無不嗚咽子厚之言身世莫不悽愴郝陵川之處真州戴剡源之入故都其言皆能惻惻動人古今自有一種文章不可磨滅真是天若有情天亦老者而世不乏堂堂之陣正正之旗皆以大文目之顧其中無可以移人之情者所謂刳然無物者也作文不可倒却架子為二氏之文須如堂上之人分别堂下臧否韓歐曽王莫不皆然東坡稍稍放寛至於宋景濓其為大浮屠塔銘和身倒入便非儒者氣象王元美為章篔誌以刻工例之徴明伯虎太函傳查八十許以節俠抑又下矣廬陵誌楊次公云其子不以銘属他人而以属修者以修言為可信也然則銘之其可不信表薛宗道云後世立言者自疑於不信又惟恐不為世之信也今之為碑版者其有能信者乎而不信先自其子孫始子孫之不信先自其官爵贈謚始聊舉一事以例其餘如某主江西試以試䇿犯時忌削籍有無頼子高守謙結黨十餘人恐喝索賂某不應遂掠其資以去某尋死崇禎初昭雪死事者竄名其中得贈侍讀學士今其子孫乃言逆奄竊柄某抗疏糾叅幾至不測閣臣為之救解已而理刑指揮高守謙等緹騎逮訊某辯論侃侃被拷掠而斃崇禎初贈侍讀學士謚文忠脱空無一事實不知文忠之謚誰則為之且并無頼之高守謙授以偽官真可笑也潘汝禎建逆奄祠於西湖某已卧病不能起奄敗遂有言某入祠不拜為守祠奄人所挺因而致死以之入奏者今無不信之矣近見修志有無名子之子孫以其父祖入於文苑勃然不悦必欲入之儒林而止嗚呼人心如是文章一道所宜亟廢矣所謂文者未有不寫其心之所明者也心茍未明劬勞憔悴於章句之間不過枝葉耳無所附之而生故古今來不必文人始有至文凡九流百家以其所明者沛然隨地湧出便是至文故使子美而談劍器必不能如公孫之波瀾柳州而叙宫室必不能如梓人之曲盡此豈可强者哉金石要例
