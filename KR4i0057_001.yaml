body:
  text: 金石要例餘姚黃宗羲撰碑版之體至宋末元初而瓌逮至今日作者既張王李趙之流子孫得之以答賻奠與紙錢寓馬相為出入使人知其子姓婚姻而已其壞又甚于元時似世系而非世系似履歷而非履歷市聲俗軌相沿不覺其非元潘蒼崖有金石例大假以昌黎為例顧未嘗著為例之義與壞例之始亦有不必例而例之者如上代兄弟宗族姻黨有書有不書不過以著名不著名初無定例乃一一以例言之余故摘其要領稍為辨正所以補蒼崖之缺也書合葬例婦人從夫故志合葬者其題只書某官某公墓志銘或墓表未有書暨配某氏也張説為蕭灌神道碑云南城侯之夫人同刻碑銘其題贈吏部尚書蕭公神道碑其妻韋氏書事實於內題則不列楊炯為王義童神道碑其子師本陪葬亦不别為標題自唐至元皆無夫婦同列者此當起于近世王慎中集中如處士陳東莊公暨配黎氏墓表蓋不一而足也婦女志例婦女之志以夫爵冠之如某官夫人某氏或某官某人妻某氏庾信陳子昂張説獨孤及皆然若子著名則以子爵冠之如柳子厚為王叔文母志書户部侍郎王公先太夫人河間劉氏婦人後夫而死者其葬書祔葬權德輿集中宏農楊氏河東縣君柳氏博陵縣君崔氏皆如此例書名例碑志之作當直書其名字而東漢諸銘載其先代多只書官唐宋名人文集所志往往只稱君諱某字某使其後至於無考為可惜稱呼例名位著者稱公名位雖著同輩以下稱君耆舊則稱府君昌黎集中有董府君獨孤府君張府君衛府君盧府君韓府君有文名者稱先生如昌黎之稱施先生貞曜先生皇甫湜之稱昌黎韓先生友人則稱字如昌黎之于李元賔樊紹述張孝權元姚牧菴稱趙提刑夫人為楊君則變例也墓志無銘例墓志而無銘者蓋敘事即銘也昌黎張圓之志云敘次其族世名字事始終而銘曰云云蓋所謂志銘者通一篇而言之非以敘事屬志韻語屬銘猶如作賦者末有重曰亂曰總之是賦不可謂重是重亂是亂也故無銘者猶賦之無重無亂者也正考甫之鼎銘云一命而僂再命而傴三命而俯循墻而走亦莫敢余侮饘于是粥于是以糊余口比干銅盤曰右林左泉後岡前道萬世之寧兹焉是保漢滕公石銘曰佳城鬱鬱三千年見白日吁嗟滕公居此室此有韻之銘也季札之喪孔子銘其墓曰嗚呼有吳延陵季子之墓衛孔悝鼎銘曰六月丁亥公假于太廟公曰叔舅乃祖莊叔左右成公成公乃命莊叔隨難于漢陽即宫于宗周奔走無射啓右獻公獻公乃命成叔纂乃祖服乃考文叔興舊耆欲作率慶士躬恤衛國其勤公家夙夜不懈民咸曰休哉公曰叔舅豫女銘若纂乃考服悝拜稽首曰對揚以辭之勤大命施于蒸彛鼎此無韻之銘也古來原有此兩樣墓表神道碑俱有銘有不銘單銘例敘事即在韻語中昌黎房使君鄭夫人殯表大理評事胡君墓銘盧渾墓志銘墓表例墓表表其人之大略可以傳世者不必細詳行事如唐文通先生宋明道之表是也歐文胡瑗石曼卿墓表皆不書子姓今制三品以上神道碑四品以下墓表銘藏于幽室人不可見碑表施于墓上以之示人雖碑表之名不同其實一也故墓表之書子姓墓表之有銘不可謂非也自有墓表更無墓碣則墓表之製方趺圓首可知矣故與碑分品級柳州稱神道表神道與墓無品級之可分也神道碑例柳州葬令曰凡五品以上為碑龜趺螭首降五品為碣方趺圓首此碑碣之分是凡言碑者即神道碑也後世則碣亦謂之碑矣豈以神道二字重于墓乎地理家以東南為神道蘇瓌碑建于塋北一十五里亦曰神道碑宋孫何碑解云班固有泗亭長碑文蔡雍有郭有道陳太丘碑文其文皆有序冠篇末則亂之以銘未嘗以碑為文章之名也逮李翺為高愍女碑羅隱為三叔碑梅先生碑則所謂序與銘皆混而不分集列其目亦不復曰文戾孰甚焉今當如班蔡之作存序與銘通謂之文可也楊炯為成知禮神道碑其碑銘之後有系曰若楚詞别自一體婦人妃主亦稱神道碑如張説和麗妃息國長公主李華東光縣主楊綰郭汾陽夫人是也行狀例行狀為議諡而作與求志而作者其體稍異為諡者須將諡法配之可不書婚娶子姓昌黎狀董晉亦書子姓柳州狀假太尉狀柳渾是也為求文者昌黎之狀馬韓柳州之狀陳京白香山之狀祖父是也婦女行狀例王魯齋曰衛公叔文子卒其子請諡于君曰日月有時將葬矣請所以易其名者請諡之詞意者今世行狀之始也自唐以來有官不應諡亦為行狀者將求名世之士為之志銘而行狀之本意始反矣觀昌黎廬陵東坡三集銘人之墓最多而行狀共不過五篇而婦人不為也又知婦人之不為行狀之意亦明矣按江淹為宋建太妃周氏行狀任昉裴野皆有婦人行狀非婦人不為行狀也行述例歐陽玄銘曽秀才云行述似翁所作孛术魯翀作姚天樞神道碑云其子侃以公行實徴録歐陽發作事迹此皆與行狀名異而實同也今既有行實又有行狀無乃重出乎誄例誄亦納于壙中故柳州虞寉鳴誄云追列遺懿求諸后土志銘亦可謂之誄元鄭師山為洪頤墓志銘云其門人俞溥狀其言行俾為之誄以識其葬子孫為祖父行狀例今人為其父行狀稱父之父為王父王父之父稱為曽王父曽王父之父稱為高王父非也稱謂當以父為主故穆員狀父云高祖宏逺曽祖固禮祖思恭考元休未嘗以員之自稱易之孫逖父銘陳子昻父志皆如之碑志煩簡例志銘藏于壙中宜簡神道碑立于墓上宜詳然范仲淹為种世衡志數千餘言韓維志程明道亦數千言東坡范蜀公志五千餘言唯昌黎煩簡得當先廟碑例先廟碑見於昌黎集中者皆敘立廟之由本其得姓之始祖功宗德而已至元則侈大其子孫於祖宗反略焉先塋先德昭先等碑名雖不同其義一也宋景濓為單氏先塋碑銘云公之勳業不附先德之後何以白前人積纍之深雖昧於造文之體不暇恤也當知碑先德而後子孫者非文之正體矣書祖父例蔡雍祖擕碑云擕字叔業曽祖父勳擕生稜稜生雍雍至勳連身六世故後漢雍傳稱勳為六世祖而唐穆員為其父志高祖上一世則稱五代祖陳子昻志父墓五世祖太樂生高祖方慶方慶生曽祖湯湯生祖通通生皇考辨柳州父神道表六代祖慶五代祖旦高祖楷蘇子美父志亦然此當從後范育吕和叔墓表稱曽祖為皇考祖為王考庾承宣為田布碑稱曽祖為王大父柳州柳府君墳前石表辭稱高祖王父曽祖王父祖王父不書子婦例女子重所歸故壻多書子婦例不書楊炯為曹通神道碑載子婦一人以其陪窆于塋內也裴抗為田承嗣神道碑載子婦二人以其為公主也而宋之黃裳志夫人黃氏男三長曰淳娶孫氏次曰昱娶楊氏少曰延娶張氏楊慈湖志舒元質云生子五人曰鈃叔晦壻曰鉦娶袁氏曰銑簡女女焉曰鍇娶趙氏曰鐻叔和之壻也方大琮志其父云大輿娶溫陵趙奉直不劬之女大琫娶福唐林簡肅栗之孫女大鏞娶薛左史元升之孫女志林景詵云男榮公聘王氏志徐母趙氏云子庭蘭娶俞料院某之孫女此外諸家文集亦不多見至元而古法蕩然閻復廣平王碑元明善淇陽王碑無不書子婦矣子女不分書所出例子女皆統于父雖異母而不分書所出在唐如權德輿志李巽三夫人四子不言某屬某氏楊綰作郭汾陽夫人神道碑六子八女俱書夫人下在宋歐公志蘇子美先娶鄭氏後娶杜氏三子志梅舜俞初娶謝氏再娶刁氏子男五人女二人溫公志吕獻可始娶張氏後娶時氏四子六女荆公志葛源元配孫氏繼配盧氏三子一女志蘇安世娶葉氏又娶某氏子四人女子五人志李宗辨男十五人女十九人俱書夫人季氏下是皆以父為主不必分屬之母此定例也然婦無别志即附見夫志之內者前後夫人不妨分屬子女如昌黎碑楊燕竒夫人李氏有男四人女二人後夫人雍氏有男一人女二人志昭武李公三娶元配韋氏生子紘女貢次配崔氏生綽紹綰今夫人無子白樂天之志元微之穆員之志鄭叔則皆用此例逮元姚牧菴碑姚樞書子女某出某出虞伯生志牟應龍亦書某出張起岩狀張宏夫人趙氏薑氏二子元節趙出元里薑出此非古法之所有也婦人志書子女例婦人之志非其所生者不書臨川志曽易占子男六人曅鞏牟宰布肇女九人其志夫人吳氏子男三鞏牟宰女一妾不書例婢妾所生之子書其子不書其母如昌黎志李郱云夫人博陵崔氏七男三女邠為澄城主簿其嫡激鄜城令放芮城尉漢監察御史滻洸潘皆進士是崔氏所生只激一人其六人皆不書其母志李惟簡云夫人崔氏有四子長曰元孫次曰元質元立元本元立元本皆崔氏出其二子皆不書其母志鄭君云初娶韋肇女生二女一男後娶李則女生一女二男其餘男二人女四人其餘者蓋婢妾所生故不書其母李定母仇氏王文公為李間志書定于正室浩氏之下不書仇氏古例皆然至元而壞之劉敏中忠獻碑書妾李謙為張文謙神道碑書側室姚牧菴阿力海涯碑書如夫人潘澤碑子希永他室李出蘇天爵高文貞碑銘子男三人履恆麻夫人出益側室王氏出耶律有尚碑子男五人長楷次朴次權皆伯德夫人出也次栝次檢庶也宋景濓方愚菴墓版文稱妾為少房不書子姓及妻例周隋碑志多不書子姓並不書配其時夫婦各自為志故不書至于合葬者夫人必書如庾子山之假永司馬裔柳霞侯莫陳道生宇文顯和諸碑是也後來歐陽為石守道志不書妻某氏子某名尹師魯亦不書子名有書子不書妻周隋間多有之至唐如孫逖志李皓獨孤及志姚子彥皆然單書嗣子例周隋之碑單書嗣子未嘗人人而書也觀庾子山諸碑司馬裔但書世子侃長孫儉但書墩等兄弟紇干宏但書世子恭等崔詵但書世子洪度辛威但書世子永達假永但書世子岌唐權文公為伊慎神道碑但書冡嗣餘書息男十六人書孫曽例昌黎碑志只書子女更無書孫者孫逖為杜義寬碑書孫以表其墓權文公為王端碑書孫以其葬王父白樂天碑崔孚書孫以其求文張曲江為吕處真書其孫女為李仁瞻書其孫李回秀為裴希惇書其孫皆以立碑故其他皆不書也至宋則皆書孫矣不特孫也且及于曽孫矣廬陵蘇明允志書孫曽子固志錢純老書孫東坡狀溫公書孫子固志沈率府子三人某某孫八人某某曽孫三人某某東坡范蜀公志書曽孫女虞伯生碑張宏範書孫六人某官某曽孫十一人某官某書孫壻例葉水心臧氏志書孫壻虞伯生狀董文用孫女十人長適某次適某某馬石田銘劉百户孫女四人一適某一適某唐時孫壻不敢入碑志或列之碑隂與先友一例權文公之碑王光謙是也書外甥例王文公仁夀縣太君徐氏志書外孫四十七人孫不宜分屬例今世書孫又各於孫下系以某子所出爾雅曰男子謂姊妹之子為出公羊傳曰蓋舅出以鄫世子巫與魯襄公俱是莒外孫同所自出故凡言出者因母姓而云也今以出屬之于父不通甚矣且父在則孫俱屬之父子不私為一己之有也不書壻祖父例女之所適但書壻之姓氏不當及壻之祖父也元明善志袁夫人史氏書女長適宋相史莊肅公嵩之之孫似伯次適工部尚書余天任之孫昌期次適宋資政殿大學士史岩之之孫益伯以顯宦著名故變例書之蘇天爵志袁文清女四人其二人書適故觀文殿大學士趙某孫田錫適故相史忠定王玄孫公佾其二人書適同知袁州路總管府事趙孟貫適處州儒學録余應矩二書祖父二不書者以著名不著名也然已為濫惡今世不論馬醫夏畦一概書某某之子若孫某不知何謂也書生卒年月日例凡書生卒止書某年某月某日不書某時書國號例凡書出仕於前代稱其國號當代稱皇柳州柳渾陳京狀是也書妻變例張景妻唐氏再適宋祁載之書女變例韓文公三女其長女初適李漢改適樊宗懿志書壻左拾遺李漢聓集賢校理樊宗懿次女許嫁陳氏三女未笄聓即壻之别名此皇甫持正變例也塔銘例柳州云凡葬大浮圖無竁穴其於用碑不宜然柳州之為浮圖碑多矣今釋氏之葬不曰碑銘而曰塔銘者猶存不宜用碑之義也書僧臘例今之為塔銘者于其終也書僧臘若干世夀若干因話録云釋氏結夏隨其身之輕重以蠟為其人解夏之後以本身驗于蠟人輕則為妄想耗其氣血矣今作伏臘之臘失其義矣柳州書為僧凡若干年其夀若干或凡年若干為僧若干期僧稱公例凡僧稱某公皆以其名宋景濓塔銘可案也今乃以其字稱公此村野驅烏所為奈何文章家因之寺碑例宋景文筆記云碑者施于墓則下棺施于廟則繫牲古人因刻文其上今佛氏揭大石鏤文士大夫皆題曰碑銘何耶案儀禮碑在堂下三分庭之一當碑揖宗廟路寢庠序皆有碑所以識日景是不特繫牲而用也碑于釋氏無礙名義如王簡栖頭陀寺碑文其來已久矣銘法例祭統銘之義稱美而不稱惡此孝子孝孫之心也故昌黎云應銘法若不應銘法則不銘之矣以此寓褒貶于其間然昌黎之于子厚言少年勇於為人不自貴重志李干單書服祕藥一事以為世戒志李虛中亦書其以水銀為黃金服之冀不死志王適書其謾侯高事志李道古言其薦妄人柳泌皆不掩所短非截然諛墓者也論文管見附昌黎陳言之務去所謂陳言者每一題必有庸人思路共集之處纒繞筆端剝去一層方有至理可言猶如玉在璞中鑿開頑璞方始見玉不可認璞為玉也不知者求之字句之間則必如曹成王碑乃謂之去陳言豈文從字順者為昌黎之所不能去乎言之不文不能行逺今人所習大概世俗之調無異吏胥之案牘旗亭之日歷即有議論敘事敝車羸馬終非鹵簿中物學文者須熟讀三史八家將平日一副家儅盡行籍沒重新積聚竹頭朩屑常談委事無不有來歷而後方可下筆顧傖父以世俗常見者為清真反視此為脂粉亦可笑也作文雖不貴模倣然要使古今體式無不備于胸中始不為大題目所壓倒有如女紅之花樣成都之錦自與三村之越異其機軸今人見歐曽一二轉折自詫能文余嘗見小兒摶泥為􅀈擊之石上鏗然有聲泥多者聲宏若以一丸為之總使能響其聲幾何此古人所以讀萬卷也敘事須有風韻不可擔板今人見此遂以為小説家伎倆不觀晉書南北史列傳每寫一二無關係之事使其人之精神生動此頰上三毫也史遷伯夷孟子屈賈等傳俱以風韻勝其填尚書國䇿者稍覺擔板矣文必本之六經始有根本唯劉向曽鞏多引經語至於韓歐融聖人之意而出之不必用經自然經術之文也近見巨子動將經文填塞以希經術去之逺矣文以理為主然而情不至則亦理之郛廓耳廬陵之志交友無不嗚咽子厚之言身世莫不悽愴郝陵川之處真州戴剡源之入故都其言皆能惻惻動人古今自有一種文章不可磨滅真是天若有情天亦老者而世不乏堂堂之陳正正之旗皆以大文目之顧其中無可以移人之情者所謂刳然無物者也作文不可倒却架子為二氏之文須如堂上之人分别堂下臧否韓歐曽王莫不皆然東坡稍稍放寬至於宋景濓其為大浮屠塔銘和身倒入便非儒者氣象王元美為章篔志以刻工例之徴明伯虎太函傳查八十許以節俠抑又下矣廬陵志楊次公云其子不以銘屬他人而以屬修者以修言為可信也然則銘之其可不信表薛宗道云後世立言者自疑於不信又惟恐不為世之信也今之為碑版者其有能信者乎而不信先自其子孫始子孫之不信先自其官爵贈諡始聊舉一事以例其餘如某主江西試以試䇿犯時忌削籍有無賴子高守謙結黨十餘人恐喝索賂某不應遂掠其資以去某尋死崇禎初昭雪死事者竄名其中得贈侍讀學士今其子孫乃言逆奄竊柄某抗疏糾參幾至不測閣臣為之救解已而理刑指揮高守謙等緹騎逮訊某辨論侃侃被拷掠而斃崇禎初贈侍讀學士諡文忠脫空無一事實不知文忠之諡誰則為之且并無賴之高守謙授以偽官真可笑也潘汝禎建逆奄祠於西湖某已卧病不能起奄敗遂有言某入祠不拜為守祠奄人所挺因而致死以之入奏者今無不信之矣近見修志有無名子之子孫以其父祖入於文苑勃然不悅必欲入之儒林而止嗚呼人心如是文章一道所宜亟廢矣所謂文者未有不寫其心之所明者也心茍未明劬勞憔悴於章句之間不過枝葉耳無所附之而生故古今來不必文人始有至文凡九流百家以其所明者沛然隨地湧出便是至文故使子美而談劍器必不能如公孫之波瀾柳州而敘宫室必不能如梓人之曲盡此豈可強者哉金石要例
